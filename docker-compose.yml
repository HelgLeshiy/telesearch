# telesearch stack.
#
# Two ways to run:
#   1. Multi-user service (default):  the `web` service exposes the REST API +
#      web UI on http://localhost:8080. Runs anywhere (CPU; SQLite + local blob
#      storage + an in-process worker). This is the recommended way.
#   2. Single-user CLI (profile `cli`): the original index/search/ask commands.
#
# Optional add-ons (off by default, enable with --profile):
#   --profile media     vLLM VLM/LLM server (GPU) for image/video captioning and
#                       `ask` RAG. Pin to a GPU via the `gpu` anchor below.
#   --profile postgres  PostgreSQL instead of the default SQLite.
#
# Quick start:
#   cp .env.example .env   # set TELESEARCH_SECRET_KEY at least
#   docker compose up -d web
#   open http://localhost:8080
#
# With media understanding (needs an NVIDIA GPU):
#   docker compose --profile media up -d vllm web
#   # and set TELESEARCH_DEVICE=cuda for `web` (see below).

x-gpu: &gpu
  gpus:
    - driver: nvidia
      device_ids: ["${TELESEARCH_GPU_DEVICE_IDS:-0}"]
      capabilities: [gpu]

services:
  # ---- Multi-user HTTP service (REST API + web UI) -------------------------
  web:
    build: .
    entrypoint: ["telesearch", "serve", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "${TELESEARCH_WEB_HOST_PORT:-8080}:8080"
    env_file:
      - path: .env
        required: false
    environment:
      TELESEARCH_DATA_DIR: /app/data
      # CPU by default so it runs without a GPU. For media indexing/RAG, set
      # TELESEARCH_DEVICE=cuda in .env and attach a GPU (see the `gpu` anchor).
      TELESEARCH_DEVICE: ${TELESEARCH_DEVICE:-cpu}
      TELESEARCH_WHISPER_COMPUTE: ${TELESEARCH_WHISPER_COMPUTE:-int8}
      # Blank DATABASE_URL => SQLite under DATA_DIR. Point at the `db` service to
      # use Postgres (see the postgres profile).
      TELESEARCH_DATABASE_URL: ${TELESEARCH_DATABASE_URL:-}
      TELESEARCH_LLM_BASE_URL: ${TELESEARCH_LLM_BASE_URL:-http://vllm:8000/v1}
    volumes:
      - telesearch-data:/app/data
      - huggingface-cache:/root/.cache/huggingface
    restart: unless-stopped

  # ---- Optional: VLM/LLM server for media captioning + RAG (GPU) -----------
  vllm:
    image: vllm/vllm-openai:latest
    <<: *gpu
    profiles: ["media"]
    ipc: host
    ports:
      - "${TELESEARCH_VLLM_HOST_PORT:-8000}:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      HF_HOME: /root/.cache/huggingface
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    command:
      - ${TELESEARCH_VLM_MODEL:-Qwen/Qwen2.5-VL-32B-Instruct}
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --served-model-name
      - ${TELESEARCH_VLM_MODEL:-Qwen/Qwen2.5-VL-32B-Instruct}
      - --max-model-len
      - "${TELESEARCH_VLLM_MAX_MODEL_LEN:-32768}"
      - --gpu-memory-utilization
      - "${TELESEARCH_VLLM_GPU_MEMORY_UTILIZATION:-0.80}"
      - --limit-mm-per-prompt
      - '${TELESEARCH_VLLM_LIMIT_MM_PER_PROMPT:-{"image": 8, "video": 0}}'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 600s
    restart: unless-stopped

  # ---- Optional: PostgreSQL (instead of the default SQLite) ----------------
  # Build the image with the `postgres` extra and set, in .env:
  #   TELESEARCH_DATABASE_URL=postgresql+psycopg://telesearch:telesearch@db:5432/telesearch
  db:
    image: postgres:16
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-telesearch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telesearch}
      POSTGRES_DB: ${POSTGRES_DB:-telesearch}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telesearch}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Optional: single-user CLI (legacy workflow) -------------------------
  cli:
    build: .
    <<: *gpu
    profiles: ["cli"]
    env_file:
      - path: .env
        required: false
    environment:
      TELESEARCH_DATA_DIR: /app/data
      TELESEARCH_LLM_BASE_URL: ${TELESEARCH_LLM_BASE_URL:-http://vllm:8000/v1}
      TELESEARCH_DEVICE: ${TELESEARCH_DEVICE:-cuda}
      TELESEARCH_WHISPER_COMPUTE: ${TELESEARCH_WHISPER_COMPUTE:-float16}
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    volumes:
      - telesearch-data:/app/data
      - ${TELESEARCH_EXPORT_ROOT:-./export}:/export:ro
      - huggingface-cache:/root/.cache/huggingface

volumes:
  telesearch-data:
  huggingface-cache:
  postgres-data:
